<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>余票监测 - 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f1a;--card:#1a1a2e;--card2:#16213e;
  --accent:#6c63ff;--accent2:#3b82f6;--green:#10b981;--red:#ef4444;
  --text:#e2e8f0;--text2:#94a3b8;--border:#2d2d44;
}
body{font-family:-apple-system,"Microsoft YaHei","Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:400px;max-width:90vw}
.login-header{text-align:center;margin-bottom:28px}
.login-header h1{font-size:20px;font-weight:600;color:#fff;margin-bottom:8px}
.login-header p{font-size:13px;color:var(--text2)}
.tabs{display:flex;margin-bottom:24px;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:10px;text-align:center;font-size:14px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:8px;font-weight:500}
.form-group input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-size:14px;outline:none;transition:border .2s}
.form-group input:focus{border-color:var(--accent)}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#5b54e8;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.error-msg{color:var(--red);font-size:13px;text-align:center;margin-bottom:12px;min-height:20px}
.success-msg{color:var(--green);font-size:13px;text-align:center;margin-bottom:12px;min-height:20px}
.panel{display:none}
.panel.active{display:block}
.hint{font-size:12px;color:var(--text2);margin-top:4px}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <h1>余票监测</h1>
    <p>上海文化广场</p>
  </div>

  {% if is_admin %}
  <!-- 开发者登录 -->
  <div class="panel active" id="adminPanel">
    <div class="error-msg" id="adminError"></div>
    <form id="adminForm">
      <div class="form-group">
        <label>开发者账号</label>
        <input type="text" id="adminUser" placeholder="请输入开发者账号" autofocus>
      </div>
      <div class="form-group">
        <label>开发者密码</label>
        <input type="password" id="adminPass" placeholder="请输入开发者密码">
      </div>
      <button type="submit" class="btn btn-primary">进入管理后台</button>
    </form>
  </div>

  {% else %}
  <!-- 普通用户 登录/注册 -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">登录</div>
    <div class="tab" onclick="switchTab('register')">注册</div>
  </div>

  <div class="panel active" id="loginPanel">
    <div class="error-msg" id="loginError"></div>
    <form id="loginForm">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="loginUsername" placeholder="已注册的用户名" autofocus>
      </div>
      <div class="form-group">
        <label>访问密码</label>
        <input type="password" id="loginPassword" placeholder="请输入密码">
      </div>
      <button type="submit" class="btn btn-primary">登录</button>
    </form>
  </div>

  <div class="panel" id="registerPanel">
    <div class="error-msg" id="regError"></div>
    <div class="success-msg" id="regSuccess"></div>
    <form id="registerForm">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="regUsername" placeholder="自定义名称，用于区分用户">
      </div>
      <div class="form-group">
        <label>访问密码</label>
        <input type="password" id="regPassword" placeholder="请输入密码">
      </div>
      <button type="submit" class="btn btn-primary">注册并进入</button>
    </form>
    <p class="hint">注册后用户名将永久保留，下次可直接登录</p>
  </div>
  {% endif %}
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', (tab === 'login' ? i === 0 : i === 1));
  });
  document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
  document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
  document.getElementById('loginError').textContent = '';
  document.getElementById('regError').textContent = '';
  document.getElementById('regSuccess').textContent = '';
}

{% if is_admin %}
document.getElementById('adminForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var errEl = document.getElementById('adminError');
  var username = document.getElementById('adminUser').value.trim();
  var password = document.getElementById('adminPass').value;
  if (!username || !password) { errEl.textContent = '请填写完整信息'; return; }
  try {
    var resp = await fetch('/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({username: username, password: password})
    });
    var data = await resp.json();
    if (data.ok) { window.location.href = '/admin'; }
    else { errEl.textContent = data.msg || '登录失败'; }
  } catch(err) { errEl.textContent = '网络错误'; }
});
{% else %}
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var errEl = document.getElementById('loginError');
  var username = document.getElementById('loginUsername').value.trim();
  var password = document.getElementById('loginPassword').value;
  if (!username) { errEl.textContent = '请输入用户名'; return; }
  if (!password) { errEl.textContent = '请输入密码'; return; }
  try {
    var resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({username: username, password: password})
    });
    var data = await resp.json();
    if (data.ok) { window.location.href = '/app'; }
    else { errEl.textContent = data.msg || '登录失败'; }
  } catch(err) { errEl.textContent = '网络错误'; }
});

document.getElementById('registerForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var errEl = document.getElementById('regError');
  var okEl = document.getElementById('regSuccess');
  errEl.textContent = ''; okEl.textContent = '';
  var username = document.getElementById('regUsername').value.trim();
  var password = document.getElementById('regPassword').value;
  if (!username) { errEl.textContent = '请输入用户名'; return; }
  if (!password) { errEl.textContent = '请输入密码'; return; }
  try {
    var resp = await fetch('/api/auth/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({username: username, password: password})
    });
    var data = await resp.json();
    if (data.ok) { window.location.href = '/app'; }
    else { errEl.textContent = data.msg || '注册失败'; }
  } catch(err) { errEl.textContent = '网络错误'; }
});
{% endif %}
</script>
</body>
</html>
